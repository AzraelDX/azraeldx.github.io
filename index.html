<!DOCTYPE html>
<html lang="de-DE">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Azrael Repository</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: #ffffff;
            background:
                radial-gradient(circle at top left, rgba(0, 140, 255, 0.25), transparent 35%),
                linear-gradient(135deg, #0b1117 0%, #111827 45%, #05070a 100%);
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }

        .card {
            width: 100%;
            max-width: 720px;
            padding: 44px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.78);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(14px);
        }

        .badge {
            display: inline-block;
            margin-bottom: 22px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.12);
            color: #7dd3fc;
            font-size: 13px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(38px, 7vw, 72px);
            line-height: 1;
            letter-spacing: -2px;
        }

        .highlight {
            color: #38bdf8;
        }

        .subtitle {
            margin-top: 18px;
            margin-bottom: 34px;
            color: #cbd5e1;
            font-size: 18px;
            line-height: 1.6;
        }

        .repo-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 18px;
            border-radius: 16px;
            background: rgba(2, 6, 23, 0.65);
            border: 1px solid rgba(148, 163, 184, 0.18);
        }

        .repo-text {
            overflow: hidden;
        }

        .repo-label {
            margin-bottom: 5px;
            color: #94a3b8;
            font-size: 13px;
        }

        .repo-url {
            color: #e2e8f0;
            font-size: 15px;
            word-break: break-all;
        }

        .button {
            flex-shrink: 0;
            display: inline-block;
            padding: 13px 20px;
            border-radius: 12px;
            background: #38bdf8;
            color: #020617;
            font-weight: bold;
            text-decoration: none;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        .button:hover {
            background: #7dd3fc;
            transform: translateY(-2px);
        }

        footer {
            margin-top: 28px;
            color: #64748b;
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .card {
                padding: 30px 24px;
            }

            .repo-box {
                align-items: flex-start;
                flex-direction: column;
            }

            .button {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <section class="card">
            <div class="badge">Kodi Repository</div>

            <h1>
                Azrael<span class="highlight"> Repo</span>
            </h1>

            <p class="subtitle">
                Offizielle Repository-Seite für Azrael. Über den folgenden Link gelangst du direkt zum Repo-Ordner.
            </p>

            <div class="repo-box">
                <div class="repo-text">
                    <div class="repo-label">Repo URL</div>
                    <div class="repo-url">https://azraeldx.github.io/repo/</div>
                </div>

                <a class="button" href="https://azraeldx.github.io/repo/">
                    Repo öffnen
                </a>
            </div>

            <footer>
                GitHub Pages by Azrael
            </footer>
        </section>
    </main>
</body>
</html>
